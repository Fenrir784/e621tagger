name: Docker Build

on:
  push:
    branches: [ "latest" ]
  pull_request:
    branches: [ "latest" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_BUILD_SUMMARY: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Determine app version    
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          APP_VERSION="test"
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == "latest" ]]; then
            PR_NUMBER=$(gh pr list --state merged --base latest --limit 1 --json number --jq '.[0].number')
            if [[ -n "$PR_NUMBER" && "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              APP_VERSION="v$PR_NUMBER"
            else
              echo "❌ Could not determine PR number for branch latest. Aborting."
              exit 1
            fi
          fi
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $APP_VERSION"

      - name: Cache model (JTP-3 hydra)
        id: cache-model
        uses: actions/cache@main
        with:
          path: models
          key: ${{ runner.os }}-model-jtp3-hydra

      - name: Download model if not cached
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          echo "Downloading model (this may take a while)..."
          wget -q --progress=bar:force:noscroll https://huggingface.co/RedRocket/JTP-3/resolve/main/models/jtp-3-hydra.safetensors -O models/jtp-3-hydra.safetensors
          echo "Model downloaded."

      - name: Cache tag data (CSV)
        id: cache-data
        uses: actions/cache@main
        with:
          path: data
          key: ${{ runner.os }}-data-jtp3-hydra

      - name: Download tag data if not cached
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          wget -q https://huggingface.co/RedRocket/JTP-3/resolve/main/data/jtp-3-hydra-tags.csv -O data/jtp-3-hydra-tags.csv

      - name: Install cosign
        uses: sigstore/cosign-installer@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@master
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Clean up docker images
        uses: dataaxiom/ghcr-cleanup-action@main
        with:
          keep-n-tagged: 4
          exclude-tags: latest,test
          delete-untagged: true
          delete-partial-images: true
          delete-orphaned-images: true

      - name: Pause for 30 seconds
        run: sleep 30s
        shell: bash

      - name: Trigger Dockhand deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/latest'
        env:
          WEBHOOK_URL: ${{ secrets.DOCKHAND_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DOCKHAND_WEBHOOK_SECRET }}
        run: |
          if [[ -z "$WEBHOOK_URL" ]]; then
            echo "⚠️ DOCKHAND_WEBHOOK_URL is not set. Skipping deployment trigger."
            exit 0
          fi
          if [[ -z "$WEBHOOK_SECRET" ]]; then
            echo "⚠️ DOCKHAND_WEBHOOK_SECRET is not set. Skipping deployment trigger."
            exit 0
          fi

          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')
          echo "Sending webhook to $WEBHOOK_URL"
          curl -sf -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
            -m "900"

      - name: Print published image info
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | cut -d' ' -f1)
          DIGEST="${{ steps.build-and-push.outputs.digest }}"
          echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${FIRST_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${DIGEST}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.app_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Built image: $FIRST_TAG"
