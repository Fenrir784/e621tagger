name: Docker Build

on:
  push:
    branches: [ "latest" ]
  pull_request:
    branches: [ "latest" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache model (JTP-3 hydra)
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models
          key: ${{ runner.os }}-model-jtp3-hydra

      - name: Download model if not cached
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          wget -q https://huggingface.co/RedRocket/JTP-3/resolve/main/models/jtp-3-hydra.safetensors -O models/jtp-3-hydra.safetensors

      - name: Cache tag data (CSV)
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data
          key: ${{ runner.os }}-data-jtp3-hydra

      - name: Download tag data if not cached
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          mkdir -p data
          wget -q https://huggingface.co/RedRocket/JTP-3/resolve/main/data/jtp-3-hydra-tags.csv -O data/jtp-3-hydra-tags.csv

      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Clean up docker images
        uses: dataaxiom/ghcr-cleanup-action@v1.0.16
        with:
          keep-n-tagged: 4
          exclude-tags: latest
          delete-untagged: true
          delete-partial-images: true
          delete-orphaned-images: true

      - name: Print published image info
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | cut -d' ' -f1)
          echo "Built image: $FIRST_TAG" >> $GITHUB_STEP_SUMMARY
          echo "Built image: $FIRST_TAG"
