name: Docker Build

on:
  push:
    branches: [ "latest" ]
  pull_request:
    branches: [ "latest" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0

      - name: Determine app version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_VERSION=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
            APP_VERSION="test-${SHORT_SHA}"
            echo "🔨 Test build, using version: $APP_VERSION"
          else
            PR_NUMBER=$(gh pr list --state merged --base latest --limit 1 --json number --jq '.[0].number')
            if [[ -n "$PR_NUMBER" && "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              APP_VERSION="v$PR_NUMBER"
              echo "💽 Merged latest release, using version: $APP_VERSION"              
            else
              SHORT_SHA=$(git rev-parse --short HEAD)
              APP_VERSION="$SHORT_SHA"
              echo "⚠️ Could not determine PR number for latest release, using commit SHA: $APP_VERSION"
            fi
          fi
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $APP_VERSION"

      - name: Cache ML model assets
        id: cache-model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            models/
            data/
          key: ml-models-${{ hashFiles('.github/workflows/docker-publish.yml') }}
          restore-keys: |
            ml-models-

      - name: Check if model exists
        id: model-exists
        run: |
          if [[ -f "models/jtp-3-hydra.safetensors" && -f "data/jtp-3-hydra-tags.csv" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download ML model assets
        if: steps.model-exists.outputs.exists != 'true'
        run: |
          mkdir -p models data
          curl -L --retry 3 --fail -o models/jtp-3-hydra.safetensors \
            "https://huggingface.co/RedRocket/JTP-3/resolve/main/models/jtp-3-hydra.safetensors"
          curl -L --retry 3 --fail -o data/jtp-3-hydra-tags.csv \
            "https://huggingface.co/RedRocket/JTP-3/resolve/main/data/jtp-3-hydra-tags.csv"
          echo "Downloaded model files (cache miss)"

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 #v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 #v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Clean up docker images
        uses: dataaxiom/ghcr-cleanup-action@244b3e8a35c266981a44b7e35da0c0e6a29b48a0 #v1.0.16
        with:
          keep-n-tagged: 4
          exclude-tags: latest,test
          delete-untagged: true
          delete-partial-images: true
          delete-orphaned-images: true

      - name: Trigger Dockhand deployment (latest)
        if: github.event_name == 'push' && github.ref_name == 'latest'
        env:
          WEBHOOK_URL: ${{ secrets.DOCKHAND_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DOCKHAND_WEBHOOK_SECRET }}
        run: |
          if [[ -z "$WEBHOOK_URL" ]]; then
            echo "⚠️ DOCKHAND_WEBHOOK_URL is not set. Skipping deployment trigger."
            exit 0
          fi
          if [[ -z "$WEBHOOK_SECRET" ]]; then
            echo "⚠️ DOCKHAND_WEBHOOK_SECRET is not set. Skipping deployment trigger."
            exit 0
          fi

          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')
          echo "Sending webhook to $WEBHOOK_URL"
          if ! curl -sf --connect-timeout 30 --max-time 300 -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"; then
            echo "❌ Latest deployment trigger failed" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          echo "✅ Latest deployed" >> $GITHUB_STEP_SUMMARY

      - name: Trigger Dockhand deployment (test)
        if: github.event_name == 'pull_request' && github.head_ref == 'test'
        env:
          WEBHOOK_URL: ${{ secrets.DOCKHAND_WEBHOOK_URL_TEST }}
          WEBHOOK_SECRET: ${{ secrets.DOCKHAND_WEBHOOK_SECRET_TEST }}
        run: |
          if [[ -z "$WEBHOOK_URL" ]]; then
            echo "⚠️ DOCKHAND_WEBHOOK_URL_TEST is not set. Skipping deployment trigger."
            exit 0
          fi
          if [[ -z "$WEBHOOK_SECRET" ]]; then
            echo "⚠️ DOCKHAND_WEBHOOK_SECRET_TEST is not set. Skipping deployment trigger."
            exit 0
          fi

          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')
          echo "Sending webhook to $WEBHOOK_URL"
          if ! curl -sf --connect-timeout 30 --max-time 300 -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"; then
            echo "❌ Test deployment trigger failed" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          echo "✅ Test deployed" >> $GITHUB_STEP_SUMMARY

      - name: Print published image info
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | cut -d' ' -f1)
          DIGEST="${{ steps.build-and-push.outputs.digest }}"
          echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${FIRST_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${DIGEST}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.app_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Built image: $FIRST_TAG"
