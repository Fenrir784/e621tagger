services:
  e621tagger:
    container_name: e621tagger-test
    image: ghcr.io/fenrir784/e621tagger:test
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: 12
    ports:
      - 5001:5000
    environment:
      - TZ=Europe/Moscow
      - SAVE_UPLOADS=false
