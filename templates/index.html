<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>e621 Tagger</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="egg-container" id="eggContainer">
                    <img src="/static/egg-top.png" alt="" class="egg-top" id="eggTop">
                    <img src="/static/egg-bottom.png" alt="" class="egg-bottom" id="eggBottom">
                    <img src="/static/f1.png" alt="" class="egg-creature" id="eggCreature">
                </div>
            </div>
            <h1>e621 Tagger</h1>
            <div class="header-right">
                <button class="settings-toggle" id="settingsToggle" aria-label="Settings">⚙️</button>
            </div>
        </header>

        <div id="dropZone" class="drop-zone">
            <div id="uploadContent" class="upload-content">
                <svg class="upload-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 16v-8m0 0-3 3m3-3 3 3M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
                </svg>
                <p>Drag & drop or click to upload</p>
                <p class="small">JPEG, PNG, WebP up to 20MB</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <div id="results" class="results">
            <div id="resultsContent" class="results-content">
                <div class="results-header">
                    <h2>Tags</h2>
                    <div class="format-toggle">
                        <span class="toggle-label">Format:</span>
                        <button id="formatE621" class="toggle-btn">e621</button>
                        <button id="formatPosty" class="toggle-btn">PostyBirb</button>
                    </div>
                </div>
                <div class="global-buttons">
                    <button id="copyGlobalConfident" class="global-copy-btn confident">📋 Copy Confident</button>
                    <button id="copyGlobalAll" class="global-copy-btn all">📋 Copy All</button>
                </div>
                <div class="rating-container">
                    <div id="ratingDisplay" class="rating-display" style="display: none;"></div>
                </div>
                <div id="categoriesContainer" class="categories-container"></div>
            </div>
        </div>

        <div class="site-info">
            Powered by <a href="https://github.com/Fenrir784/e621tagger" target="_blank">e621Tagger</a> • 
            Model: <a href="https://huggingface.co/Fenrir784/e621-vit-l-large" target="_blank">e621-vit-l-large</a> • 
            Data from <a href="https://e621.net" target="_blank">e621.net</a>
        </div>
    </div>

    <div id="notification-container"></div>

    <div id="settingsMenu" class="settings-menu">
        <div class="settings-header">
            <span>Settings</span>
            <div class="theme-toggle-group">
                <button class="theme-option" data-theme="system">🌓 System</button>
                <button class="theme-option" data-theme="light">☀️ Light</button>
                <button class="theme-option" data-theme="dark">🌙 Dark</button>
            </div>
            <button id="closeSettings" class="close-settings">✕</button>
        </div>
        <div class="settings-section">
            <h3>Confidence thresholds</h3>
            <div class="preset-buttons">
                <button class="preset-btn" data-preset="conservative">Conservative (0.65 / 0.85)</button>
                <button class="preset-btn" data-preset="standard">Standard (0.55 / 0.75)</button>
                <button class="preset-btn" data-preset="liberal">Liberal (0.45 / 0.65)</button>
                <button class="preset-btn" data-preset="custom">Custom</button>
            </div>
            <div id="customThresholdsPanel" class="custom-thresholds-panel">
                <div class="custom-inputs">
                    <div class="input-group">
                        <label>All (≥)</label>
                        <input type="number" id="customAll" step="0.01" min="0" max="1">
                    </div>
                    <div class="input-group">
                        <label>Confident (≥)</label>
                        <input type="number" id="customConfident" step="0.01" min="0" max="1">
                    </div>
                </div>
                <button id="applyCustom" class="apply-btn">Apply custom</button>
            </div>
        </div>
        <div class="settings-section">
            <h3>Default format</h3>
            <div class="format-toggle-group">
                <button class="format-option" data-format="e621">e621</button>
                <button class="format-option" data-format="posty">PostyBirb</button>
            </div>
        </div>
        <div class="settings-section">
            <h3>Max tags to return</h3>
            <div class="max-tags-group">
                <button class="max-tag-option" data-max="50">50</button>
                <button class="max-tag-option" data-max="75">75</button>
                <button class="max-tag-option" data-max="100">100</button>
                <button class="max-tag-option" data-max="150">150</button>
                <button class="max-tag-option" data-max="200">200</button>
                <button class="max-tag-option" data-max="250">250</button>
            </div>
        </div>
        <div class="settings-section">
            <button id="resetSettings" class="reset-btn">Reset to defaults</button>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
